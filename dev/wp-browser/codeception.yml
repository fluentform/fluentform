namespace: Tests\Support
paths:
    tests: tests
    output: tests/_output
    data: tests/Support/Data
    support: tests/Support
    envs: tests/_envs
actor_suffix: Tester
settings:
    shuffle: false
    lint: true
extensions:
    enabled:
        - Codeception\Extension\RunFailed
params:
    - tests/.env
coverage:
    enabled: true
    include:
        - ../../app/*
    exclude:
        - ../../app/Views/*
        - ../../app/Services/Libraries/*
        - ../../app/Modules/Widgets/*
        - ../../app/Modules/CLI/*
        - ../../database/Migrations/*
